name: Build & Release Cluster Files APK

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release Notes (optional)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: 'cl-andro/cluster-files'
          ref: 'main'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Calculate Next Version Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the latest release tag using GitHub CLI
          LATEST_TAG=$(gh release view --json tagName --template '{{.tagName}}' 2>/dev/null || echo "v1.0")
          echo "Latest tag found: $LATEST_TAG"
          
          # Strip the leading 'v'
          VERSION=${LATEST_TAG#v}
          
          # Parse Major and Minor numbers
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          
          if [ -z "$MINOR" ]; then MINOR=0; fi
          
          # Increment minor version
          MINOR=$((MINOR + 1))
          
          # Rollover logic (e.g., v1.9 -> v2.0)
          if [ "$MINOR" -ge 10 ]; then
            MINOR=0
            MAJOR=$((MAJOR + 1))
          fi
          
          NEXT_TAG="v$MAJOR.$MINOR"
          echo "Calculated next tag: $NEXT_TAG"
          
          # Save variables to environment
          echo "NEXT_TAG=$NEXT_TAG" >> $GITHUB_ENV
          echo "APK_NAME=cluster-file-$NEXT_TAG.apk" >> $GITHUB_ENV

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-signing-key.jks

      - name: Inject Version into app/build.gradle
        run: |
          VERSION_WITHOUT_V=${NEXT_TAG#v}
          sed -i "s/versionName '[^']*'/versionName '$VERSION_WITHOUT_V'/g" app/build.gradle
          echo "Injected versionName: $VERSION_WITHOUT_V"

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEYSTORE_FILE: '${{ github.workspace }}/app/release-signing-key.jks'
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Rename Output APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          cp "$APK_PATH" "$APK_NAME"
          echo "Prepared APK: $APK_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEXT_TAG }}
          name: "Release ${{ env.NEXT_TAG }}"
          body: ${{ inputs.release_notes }}
          files: ${{ env.APK_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
